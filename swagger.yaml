openapi: 3.0.3
info:
  title: i4nvoice API
  version: 3.0.0
  description: |
    # i4nvoice API Documentation
    
    Multi-tenant invoice management system with FIRS-compliant Invoice Reference Number (IRN) generation.
    
    ## Authentication
    
    Uses JWT (JSON Web Tokens) with HMAC-SHA256 signatures.
    
    **To authenticate:**
    1. POST /api/auth/login with credentials
    2. Extract token from response
    3. Include in requests: `Authorization: Bearer {token}`
    
    **Token lifetime:** 24 hours (configurable)
    
    ## Multi-Tenant Architecture
    
    Each company operates in an isolated PostgreSQL schema ensuring complete data separation.
    
    ## Permissions
    
    - **view**: Read access to invoices and reports
    - **submit**: Create and submit invoices
    - **approve**: Approve invoices and submit to NRS

servers:
  - url: http://localhost:4000
    description: Development server
  - url: https://api.i4nvoice.com
    description: Production server

tags:
  - name: Authentication
    description: User authentication and authorization
  - name: Invoices
    description: Invoice management operations
  - name: Reports
    description: Reporting and analytics
  - name: Settings
    description: System configuration

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT authentication token. Include in header: `Authorization: Bearer <token>`
        
        Obtain token from POST /api/auth/login

  schemas:
    ApiSuccess:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Operation successful
        data:
          type: object
          nullable: true
        meta:
          type: object
          nullable: true

    ApiError:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Error message
        error:
          type: object
          properties:
            code:
              type: string
            details:
              nullable: true

    User:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        full_name:
          type: string
          nullable: true
        company_name:
          type: string
        role:
          type: string
          enum: [admin, manager, user, viewer]
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time

    Invoice:
      type: object
      properties:
        invoice_id:
          type: integer
        irn:
          type: string
          description: FIRS-compliant Invoice Reference Number
        issue_date:
          type: string
          format: date
        due_date:
          type: string
          format: date
          nullable: true
        status:
          type: string
          enum: [draft, in-approval, sent, paid, failed]
        business_name:
          type: string
        payable_amount:
          type: number
        tax_amount:
          type: number
        document_currency_code:
          type: string
        nrs_business_id:
          type: string
          nullable: true
        submitted_at:
          type: string
          format: date-time
          nullable: true

    InvoiceCreate:
      type: object
      required:
        - issue_date
        - document_currency_code
        - tax_currency_code
        - accounting_supplier_party
        - accounting_customer_party
        - invoice_line
        - legal_monetary_total
      properties:
        business_id:
          type: string
          format: uuid
          description: Optional. Auto-selected if not provided
        irn:
          type: string
          description: FIRS IRN format [InvoiceNumber]-[ServiceID]-[Timestamp]
          example: INV001-94ND90NR-20240611
        invoice_number:
          type: string
          description: Alphanumeric only. System generates IRN if provided
          example: INV001
        issue_date:
          type: string
          format: date
        due_date:
          type: string
          format: date
        status:
          type: string
          enum: [draft, in-approval]
          default: draft
        document_currency_code:
          type: string
          example: NGN
        tax_currency_code:
          type: string
          example: NGN
        note:
          type: string
        accounting_supplier_party:
          $ref: '#/components/schemas/Party'
        accounting_customer_party:
          $ref: '#/components/schemas/Party'
        invoice_line:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/InvoiceLine'
        legal_monetary_total:
          $ref: '#/components/schemas/MonetaryTotal'
        tax_total:
          type: array
          items:
            $ref: '#/components/schemas/TaxTotal'

    Party:
      type: object
      required:
        - party_name
        - tin
      properties:
        party_name:
          type: string
        tin:
          type: string
        email:
          type: string
        telephone:
          type: string
        postal_address:
          type: object
          properties:
            street_name:
              type: string
            city_name:
              type: string
            postal_zone:
              type: string
            country:
              type: string

    InvoiceLine:
      type: object
      required:
        - invoiced_quantity
        - line_extension_amount
        - item
        - price
      properties:
        line_number:
          type: integer
        invoiced_quantity:
          type: number
        line_extension_amount:
          type: number
        hsn_code:
          type: string
        product_category:
          type: string
        discount_rate:
          type: number
        discount_amount:
          type: number
        item:
          type: object
          required:
            - name
          properties:
            name:
              type: string
            description:
              type: string
        price:
          type: object
          required:
            - price_amount
          properties:
            price_amount:
              type: number
            base_quantity:
              type: number
            price_unit:
              type: string

    MonetaryTotal:
      type: object
      required:
        - line_extension_amount
        - tax_exclusive_amount
        - tax_inclusive_amount
        - payable_amount
      properties:
        line_extension_amount:
          type: number
        tax_exclusive_amount:
          type: number
        tax_inclusive_amount:
          type: number
        payable_amount:
          type: number

    TaxTotal:
      type: object
      properties:
        tax_amount:
          type: number
        tax_subtotal:
          type: array
          items:
            type: object
            properties:
              taxable_amount:
                type: number
              tax_amount:
                type: number
              tax_category:
                type: object
                properties:
                  id:
                    type: string
                  percent:
                    type: number

security:
  - BearerAuth: []

paths:
  /api/auth/register:
    post:
      tags:
        - Authentication
      summary: Register new user
      description: Creates a new user account and company schema if needed
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - companyName
              properties:
                fullName:
                  type: string
                  example: John Doe
                email:
                  type: string
                  format: email
                  example: john@company.com
                password:
                  type: string
                  minLength: 8
                  example: password123
                companyName:
                  type: string
                  example: Acme Corp
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/auth/login:
    post:
      tags:
        - Authentication
      summary: Login
      description: Authenticate and receive JWT token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
                - companyName
              properties:
                username:
                  type: string
                  example: admin
                password:
                  type: string
                  example: Admin@123
                companyName:
                  type: string
                  example: I4nnova
                rememberMe:
                  type: boolean
                  default: false
            example:
              username: admin
              password: Admin@123
              companyName: I4nnova
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          token:
                            type: string
                            description: JWT token
                          user:
                            $ref: '#/components/schemas/User'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/auth/verify:
    get:
      tags:
        - Authentication
      summary: Verify token
      description: Verify if authentication token is valid
      responses:
        '200':
          description: Token valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
        '401':
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/auth/change-password:
    post:
      tags:
        - Authentication
      summary: Change password
      description: Change current user's password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Password changed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
        '401':
          description: Current password incorrect
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/invoices:
    post:
      tags:
        - Invoices
      summary: Create invoice
      description: |
        Creates an invoice with FIRS-compliant IRN.
        
        **Authentication:** Optional
        - With token: Uses user's company, requires 'submit' permission
        - Without token: Defaults to I4nnova company
        
        **IRN Options:**
        1. Provide `irn` field (validated)
        2. Provide `invoice_number` (auto-generates IRN)
      security:
        - BearerAuth: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvoiceCreate'
            examples:
              minimal:
                summary: Minimal invoice
                value:
                  invoice_number: INV001
                  issue_date: '2024-06-11'
                  document_currency_code: NGN
                  tax_currency_code: NGN
                  accounting_supplier_party:
                    party_name: My Company Ltd
                    tin: '12345678901'
                  accounting_customer_party:
                    party_name: Customer Company Ltd
                    tin: '98765432109'
                  invoice_line:
                    - invoiced_quantity: 1
                      line_extension_amount: 10000
                      item:
                        name: Professional Services
                      price:
                        price_amount: 10000
                  legal_monetary_total:
                    line_extension_amount: 10000
                    tax_exclusive_amount: 10000
                    tax_inclusive_amount: 11750
                    payable_amount: 11750
      responses:
        '201':
          description: Invoice created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          invoice_id:
                            type: integer
        '400':
          description: Validation error or missing service_id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Duplicate IRN
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/all-invoices:
    get:
      tags:
        - Invoices
      summary: List invoices
      description: Get paginated list of invoices
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Invoices retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Invoice'
                      meta:
                        type: object
                        properties:
                          page:
                            type: integer
                          limit:
                            type: integer
                          total:
                            type: integer
                          totalPages:
                            type: integer

  /api/invoice/{id}:
    get:
      tags:
        - Invoices
      summary: Get invoice by ID
      description: Get detailed invoice information
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Invoice retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
        '404':
          description: Invoice not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/invoices/stats:
    get:
      tags:
        - Invoices
      summary: Get invoice statistics
      description: Get aggregated invoice statistics
      responses:
        '200':
          description: Statistics retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          total_invoices:
                            type: integer
                          total_payable:
                            type: number
                          paid_payable:
                            type: number
                          in_approval_payable:
                            type: number
                          submitted_count:
                            type: integer
                          in_approval_count:
                            type: integer
                          failed_count:
                            type: integer

  /api/invoices/submit-to-nrs:
    post:
      tags:
        - Invoices
      summary: Submit invoices to NRS
      description: Submit approved invoices to National Revenue Service
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - invoice_ids
              properties:
                invoice_ids:
                  type: array
                  minItems: 1
                  items:
                    type: integer
      responses:
        '200':
          description: Invoices submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
        '400':
          description: Already submitted or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/invoices/in-approval:
    get:
      tags:
        - Invoices
      summary: Get invoices in approval
      description: Get invoices awaiting approval
      responses:
        '200':
          description: Invoices retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'

  /api/invoices/approve:
    post:
      tags:
        - Invoices
      summary: Approve invoices
      description: Approve invoices for submission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - invoice_ids
              properties:
                invoice_ids:
                  type: array
                  minItems: 1
                  items:
                    type: integer
      responses:
        '200':
          description: Invoices approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/invoices/failed:
    get:
      tags:
        - Invoices
      summary: Get failed invoices
      description: Get invoices that failed submission
      responses:
        '200':
          description: Failed invoices retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'

  /api/invoices/retry:
    post:
      tags:
        - Invoices
      summary: Retry failed invoice
      description: Reset failed invoice for retry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - invoice_id
              properties:
                invoice_id:
                  type: integer
      responses:
        '200':
          description: Invoice reset for retry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
        '404':
          description: Invoice not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/invoices/upload-excel:
    post:
      tags:
        - Invoices
      summary: Upload invoices via Excel
      description: Bulk upload invoices from Excel file
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Excel file (.xlsx)
      responses:
        '200':
          description: Excel file processed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          successCount:
                            type: integer
                          errors:
                            type: array
                            items:
                              type: object
                              properties:
                                row:
                                  type: integer
                                message:
                                  type: string
        '400':
          description: Invalid file or format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/invoices/template:
    get:
      tags:
        - Invoices
      summary: Download Excel template
      description: Download invoice upload template
      responses:
        '200':
          description: Template file
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary

  /api/settings:
    get:
      tags:
        - Settings
      summary: Get settings
      description: Get company workflow settings
      responses:
        '200':
          description: Settings retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          require_approval:
                            type: boolean
                          approval_threshold:
                            type: number
                          auto_approve_below_threshold:
                            type: boolean
    put:
      tags:
        - Settings
      summary: Update settings
      description: Update company workflow settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                require_approval:
                  type: boolean
                approval_threshold:
                  type: number
                auto_approve_below_threshold:
                  type: boolean
      responses:
        '200':
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'

  /api/reports/summary:
    get:
      tags:
        - Reports
      summary: Get summary report
      description: Get invoice summary report
      parameters:
        - name: start_date
          in: query
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Report generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'

  /api/users:
    get:
      tags:
        - Authentication
      summary: List users
      description: Get all users in company (admin only)
      responses:
        '200':
          description: Users retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/User'

  /api/users/{id}/permissions:
    get:
      tags:
        - Authentication
      summary: Get user permissions
      description: Get permissions for specific user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Permissions retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
    put:
      tags:
        - Authentication
      summary: Update user permissions
      description: Update permissions for specific user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                permissions:
                  type: array
                  items:
                    type: string
                    enum: [view, submit, approve]
      responses:
        '200':
          description: Permissions updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
