openapi: 3.0.3
info:
  title: i4nvoice API
  version: 4.0.0
  description: |
    # i4nvoice API Documentation

    ## ERP Integration Guide

    This guide documents the recommended production flow for integrating an ERP with i4nvoice.

    ### 1) Provision Integration Credentials

    From **Settings -> Developer Options** in the web app:

    1. Copy your ERP endpoint: `/api/erp/{companyId}/invoices`
    2. Generate an API credential pair (`api_key`, `secret`)
    3. Store the secret securely (it is shown once)

    ### 2) Sign ERP Requests (HMAC)

    Every ERP POST to `/api/erp/{companyId}/invoices` must include:

    | Header | Value |
    |---|---|
    | `X-Api-Key` | API key from Developer Options |
    | `X-Timestamp` | Unix epoch seconds |
    | `X-Nonce` | Unique request nonce (UUID recommended) |
    | `X-Signature` | HMAC-SHA256 hex digest |

    Signature formula:

    ```
    signature = HMAC_SHA256(secret, "{timestamp}.{raw_json_body}")
    ```

    Important:
    - Sign the exact same raw JSON string sent in the HTTP body.
    - Nonce must be unique per request.
    - Timestamp outside allowed skew is rejected.

    ### 3) Post Invoice from ERP

    Use `POST /api/erp/{companyId}/invoices`.

    ### Credit Note Rule (Explicit)

    If your invoice resolves to **Credit Note** (`invoice_type_code = "380"`), then you must provide:
    - `originator_document_reference` as an array, where at least one element has a non-empty `irn`
    - Example: `originator_document_reference: [{ irn: "INV2025007-D0164F59-20251215", issue_date: "2025-12-15" }]`

    Requests without this field are rejected with validation error.

    ### ERP Payload Field Guide (Mappings-Aligned)

    This list mirrors the same canonical field IDs shown in **Settings -> Mappings** so ERP integrators can see the full set of supported fields, including required/optional behavior.

    - `invoice_number` — **Required** — Example: `INV2026001`
    - `issue_date` — **Required** — Example: `2026-03-19`
    - `due_date` — **Optional** — Example: `2026-04-18`
    - `invoice_type_code` — **Optional** — Example: `381`
    - `invoice_kind` — **Optional** — Example: `B2B`
    - `document_currency_code` — **Required** — Example: `NGN`
    - `tax_currency_code` — **Required** — Example: `NGN`
    - `payment_status` — **Optional** — Example: `pending`
    - `note` — **Optional** — Example: `Payment due in 30 days`
    - `tax_point_date` — **Optional** — Example: `2026-03-19`
    - `accounting_cost` — **Optional** — Example: `COST-CENTER-01`
    - `buyer_reference` — **Optional** — Example: `PO-000221`
    - `order_reference` — **Optional** — Example: `SO-000221`
    - `actual_delivery_date` — **Optional** — Example: `2026-03-20`
    - `payment_terms_note` — **Optional** — Example: `Net 30 days`
    - `invoice_delivery_period.start_date` — **Optional** — Example: `2026-03-01`
    - `invoice_delivery_period.end_date` — **Optional** — Example: `2026-03-31`
    - `billing_reference.irn` — **Optional** — Example: `INV2025003-D0164F59-20251201`
    - `billing_reference.issue_date` — **Optional** — Example: `2025-12-01`
    - `originator_document_reference.irn` — **Optional** — Example: `INV2025007-D0164F59-20251215`
    - `originator_document_reference.issue_date` — **Optional** — Example: `2025-12-15`
    - `dispatch_document_reference.irn` — **Optional** — Example: `DSP2026001-D0164F59-20260318`
    - `receipt_document_reference.irn` — **Optional** — Example: `RCV2026001-D0164F59-20260320`
    - `contract_document_reference.irn` — **Optional** — Example: `CTR2026001-D0164F59-20260101`
    - `additional_document_reference.irn` — **Optional** — Example: `ADD2026001-D0164F59-20260310`
    - `tax_total.tax_amount` — **Optional** — Example: `7500`
    - `tax_total.tax_subtotal.taxable_amount` — **Optional** — Example: `50000`
    - `tax_total.tax_subtotal.tax_amount` — **Optional** — Example: `7500`
    - `tax_total.tax_subtotal.tax_category.id` — **Optional** — Example: `VAT`
    - `tax_total.tax_subtotal.tax_category.percent` — **Optional** — Example: `7.5`
    - `legal_monetary_total.line_extension_amount` — **Required** — Example: `50000`
    - `legal_monetary_total.tax_exclusive_amount` — **Required** — Example: `50000`
    - `legal_monetary_total.tax_inclusive_amount` — **Required** — Example: `57500`
    - `legal_monetary_total.payable_amount` — **Required** — Example: `57500`
    - `invoice_line.hsn_code` — **Optional** — Example: `8471.30`
    - `invoice_line.product_category` — **Optional** — Example: `COMPUTER`
    - `invoice_line.isic_code` — **Optional** — Example: `6201`
    - `invoice_line.service_category` — **Optional** — Example: `CONSULTING`
    - `invoice_line.discount_rate` — **Optional** — Example: `5`
    - `invoice_line.discount_amount` — **Optional** — Example: `2500`
    - `invoice_line.fee_rate` — **Optional** — Example: `1`
    - `invoice_line.fee_amount` — **Optional** — Example: `500`
    - `invoice_line.invoiced_quantity` — **Required** — Example: `10`
    - `invoice_line.line_extension_amount` — **Required** — Example: `50000`
    - `invoice_line.item.name` — **Required** — Example: `Laptop Computer`
    - `invoice_line.item.description` — **Optional** — Example: `Core i7, 16GB RAM`
    - `invoice_line.item.sellers_item_identification` — **Optional** — Example: `SKU-LAP-001`
    - `invoice_line.price.price_amount` — **Required** — Example: `5000`
    - `invoice_line.price.base_quantity` — **Required** — Example: `1`
    - `invoice_line.price.price_unit` — **Required** — Example: `EA`
    - `accounting_supplier_party.party_name` — **Required** — Example: `Acme Corp Ltd`
    - `accounting_supplier_party.tin` — **Required** — Example: `12345678-0001`
    - `accounting_supplier_party.email` — **Optional** — Example: `billing@acme.com`
    - `accounting_supplier_party.telephone` — **Optional** — Example: `+2348012345678`
    - `accounting_supplier_party.business_description` — **Optional** — Example: `Electronics supplier`
    - `accounting_supplier_party.postal_address.street_name` — **Optional** — Example: `12 Marina Street`
    - `accounting_supplier_party.postal_address.city_name` — **Optional** — Example: `Lagos`
    - `accounting_supplier_party.postal_address.postal_zone` — **Optional** — Example: `100001`
    - `accounting_supplier_party.postal_address.lga` — **Optional** — Example: `NG-LA-IKE`
    - `accounting_supplier_party.postal_address.state` — **Optional** — Example: `NG-LA`
    - `accounting_supplier_party.postal_address.country` — **Optional** — Example: `NG`
    - `accounting_customer_party.party_name` — **Optional** — Example: `Buyer Company Ltd`
    - `accounting_customer_party.tin` — **Optional** — Example: `98765432-0001`
    - `accounting_customer_party.email` — **Optional** — Example: `buyer@example.com`
    - `accounting_customer_party.telephone` — **Optional** — Example: `+2348098765432`
    - `accounting_customer_party.business_description` — **Optional** — Example: `Retail buyer`
    - `accounting_customer_party.postal_address.street_name` — **Optional** — Example: `5 Broad Street`
    - `accounting_customer_party.postal_address.city_name` — **Optional** — Example: `Abuja`
    - `accounting_customer_party.postal_address.postal_zone` — **Optional** — Example: `900001`
    - `accounting_customer_party.postal_address.lga` — **Optional** — Example: `NG-FC-ABJ`
    - `accounting_customer_party.postal_address.state` — **Optional** — Example: `NG-FC`
    - `accounting_customer_party.postal_address.country` — **Optional** — Example: `NG`
    - `payment_means.payment_means_code` — **Optional** — Example: `30`
    - `payment_means.payment_due_date` — **Optional** — Example: `2026-04-18`
    - `allowance_charge.charge_indicator` — **Optional** — Example: `false`
    - `allowance_charge.amount` — **Optional** — Example: `1000`

    Key behavior:
    - `irn` is generated by middleware (do not send manually unless your flow explicitly requires it)
    - payload is validated and normalized
    - invoice is saved in company scope
    - if an IRN already exists, current invoice is updated and previous version is snapshotted

    ### 4) Internal Invoice Processing (Handled by Middleware)

    User flow from dashboard:
    1. Review invoices in **All Invoices**
    2. Approve / Submit
    3. Middleware processes approved invoices sequentially

    ### 5) Mark Paid

    After invoices are processed externally, users can mark them as paid.

    Processing rule:
    - selected invoices are processed sequentially
    - local invoice status updates to `paid` only when the external update succeeds

    ### 6) Recommended End-to-End Sequence

    ```
    ERP -> POST /api/erp/{companyId}/invoices
    Middleware -> stores invoice as draft/in-approval flow
    User -> approve/submit
    Middleware -> external submission and local status updates
    User -> mark paid
    Middleware -> local status = paid
    ```

    ## Permissions

    | Permission | Typical capability |
    |---|---|
    | `view` | View invoices, stats, reports |
    | `submit` | Create/upload invoices |
    | `approve` | Approve invoices and trigger middleware processing |

    ## Common Error Categories

    | HTTP | Meaning |
    |---|---|
    | 400 | Validation or business rule error |
    | 401 | Missing/invalid auth or signature |
    | 403 | Permission denied |
    | 404 | Resource not found |
    | 409 | Conflict (e.g., duplicate current IRN) |
    | 5xx | Server / dependency failure |
servers:
  - url: /
tags:
  - name: ERP Integration
  - name: Authentication
  - name: Invoices
  - name: Company
  - name: Mappings
  - name: Reports
  - name: Settings
  - name: Users
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT token obtained from POST /api/auth/login. Include as `Authorization: Bearer <token>`"
  schemas:
    ApiSuccess:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          type: object
          nullable: true
        meta:
          type: object
          nullable: true
    ApiError:
      type: object
      properties:
        success:
          type: boolean
          example: false
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
        error:
          type: string
          nullable: true
        details:
          nullable: true
    User:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        full_name:
          type: string
          nullable: true
        company_name:
          type: string
        role:
          type: string
          enum: [admin, manager, user, viewer]
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
    Invoice:
      type: object
      properties:
        invoice_id:
          type: integer
        irn:
          type: string
          description: "FIRS IRN: [InvoiceNumber]-[ServiceID]-[YYYYMMDD]"
        issue_date:
          type: string
          format: date
        due_date:
          type: string
          format: date
          nullable: true
        status:
          type: string
          enum: [draft, in-approval, sent, paid, failed]
        payment_status:
          type: string
          description: "Payment status: unpaid, pending, paid, or rejected (legacy PAID/PENDING accepted). Invalid or missing values are stored as pending. Separate from submission workflow status."
          example: pending
        business_name:
          type: string
        payable_amount:
          type: number
        tax_amount:
          type: number
        document_currency_code:
          type: string
        nrs_business_id:
          type: string
          nullable: true
        submitted_at:
          type: string
          format: date-time
          nullable: true
    InvoicePayload:
      type: object
      required:
        - invoice_number
        - issue_date
        - document_currency_code
        - tax_currency_code
        - accounting_supplier_party
        - legal_monetary_total
        - invoice_line
      properties:
        invoice_number:
          type: string
          description: Alphanumeric only - no hyphens, underscores or special characters. IRN is generated from this automatically.
          example: INV2026001
        issue_date:
          type: string
          format: date
          example: 2026-03-19
        due_date:
          type: string
          format: date
          nullable: true
        invoice_type_code:
          type: string
          example: "380"
          nullable: true
          description: NRS invoice type code. When this resolves to `380` (Credit Note), send originator_document_reference as an array and include at least one element with a non-empty irn.
        document_currency_code:
          type: string
          example: NGN
        tax_currency_code:
          type: string
          example: NGN
        note:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft, in-approval]
          default: draft
        payment_status:
          type: string
          description: "Payment state: unpaid, pending, paid, or rejected (legacy PAID/PENDING accepted on ingest). Invalid or missing values are stored as pending. Separate from workflow status."
          example: pending
          nullable: true
        business_id:
          type: string
          format: uuid
          nullable: true
          description: Auto-selected if omitted
        tax_point_date:
          type: string
          format: date
          nullable: true
        accounting_cost:
          type: string
          nullable: true
        buyer_reference:
          type: string
          nullable: true
        order_reference:
          type: string
          nullable: true
        actual_delivery_date:
          type: string
          format: date
          nullable: true
        payment_terms_note:
          type: string
          nullable: true
        accounting_supplier_party:
          type: object
          required: [party_name, tin]
          properties:
            party_name:
              type: string
              example: Acme Corp Ltd
            tin:
              type: string
              example: 12345678-0001
              description: Used as unique key - upserted on conflict
            email:
              type: string
              nullable: true
            telephone:
              type: string
              nullable: true
            business_description:
              type: string
              nullable: true
            postal_address:
              type: object
              nullable: true
              properties:
                street_name:
                  type: string
                city_name:
                  type: string
                postal_zone:
                  type: string
                country:
                  type: string
                  example: NG
                  description: ISO 3166-1 alpha-2
        accounting_customer_party:
          type: object
          nullable: true
          description: "Optional on the invoice. Validation is conditional by invoice_kind: for B2B/default (including B2G), when present, party_name, tin, email, and postal_address are required (postal_address must include street_name, city_name, postal_zone, lga, state, and country); for B2C, minimal buyer fields are required when present: party_name, email, and telephone. For B2C, missing tin/postal_address are auto-populated with system defaults before NRS validation and storage."
          required: [party_name, tin, email, postal_address]
          properties:
            party_name:
              type: string
              example: Buyer Company Ltd
            tin:
              type: string
              example: 98765432-0001
            email:
              type: string
              example: buyer@example.com
            telephone:
              type: string
              nullable: true
            business_description:
              type: string
              nullable: true
            postal_address:
              type: object
              required: [street_name, city_name, postal_zone, lga, state, country]
              properties:
                street_name:
                  type: string
                city_name:
                  type: string
                postal_zone:
                  type: string
                lga:
                  type: string
                  example: NG-AB-ANO
                state:
                  type: string
                  example: NG-AB
                country:
                  type: string
                  example: NG
                  description: ISO 3166-1 alpha-2
        tax_total:
          type: array
          items:
            type: object
            required: [tax_amount]
            properties:
              tax_amount:
                type: number
                example: 7500
              tax_subtotal:
                type: array
                items:
                  type: object
                  properties:
                    taxable_amount:
                      type: number
                      example: 50000
                    tax_amount:
                      type: number
                      example: 7500
                    tax_category:
                      type: object
                      properties:
                        id:
                          type: string
                          example: VAT
                        percent:
                          type: number
                          example: 7.5
        legal_monetary_total:
          type: object
          required:
            - line_extension_amount
            - tax_exclusive_amount
            - tax_inclusive_amount
            - payable_amount
          properties:
            line_extension_amount:
              type: number
              example: 50000
            tax_exclusive_amount:
              type: number
              example: 50000
            tax_inclusive_amount:
              type: number
              example: 57500
            payable_amount:
              type: number
              example: 57500
        invoice_line:
          type: array
          minItems: 1
          items:
            type: object
            required:
              - invoiced_quantity
              - line_extension_amount
              - item
              - price
            properties:
              line_number:
                type: integer
                example: 1
              invoiced_quantity:
                type: number
                example: 10
              line_extension_amount:
                type: number
                example: 50000
              hsn_code:
                type: string
                nullable: true
              product_category:
                type: string
                nullable: true
              isic_code:
                type: string
                nullable: true
              service_category:
                type: string
                nullable: true
              discount_rate:
                type: number
                nullable: true
              discount_amount:
                type: number
                nullable: true
              fee_rate:
                type: number
                nullable: true
              fee_amount:
                type: number
                nullable: true
              item:
                type: object
                required: [name]
                properties:
                  name:
                    type: string
                    example: Laptop Computer
                  description:
                    type: string
                    nullable: true
                  sellers_item_identification:
                    type: string
                    nullable: true
                    example: SKU-LAP-001
              price:
                type: object
                required: [price_amount, base_quantity, price_unit]
                properties:
                  price_amount:
                    type: number
                    example: 5000
                  base_quantity:
                    type: number
                    example: 1
                  price_unit:
                    type: string
                    example: NGN per 1
        payment_means:
          type: array
          nullable: true
          items:
            type: object
            properties:
              payment_means_code:
                type: string
                example: "30"
              payment_due_date:
                type: string
                format: date
                nullable: true
        allowance_charge:
          type: array
          nullable: true
          items:
            type: object
            properties:
              charge_indicator:
                type: boolean
                description: false = allowance (discount), true = charge
              amount:
                type: number
              reason:
                type: string
                nullable: true
        invoice_delivery_period:
          type: object
          nullable: true
          properties:
            start_date:
              type: string
              format: date
            end_date:
              type: string
              format: date
security:
  - BearerAuth: []
paths:
  /api/erp/{companyId}/verify-signature:
    post:
      summary: Verify ERP HMAC signature
      description: |
        Use this endpoint to test whether your ERP HMAC signing implementation is correct.

        It validates:
        - API key
        - timestamp window
        - signature correctness against raw body
        - company authorization for the key

        Unlike ingest, this endpoint is validation-only and does not create/update invoices.
      tags: [ERP Integration]
      security: []
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: string
          description: Your company ID as used in ERP endpoint
        - name: X-Api-Key
          in: header
          required: true
          schema:
            type: string
        - name: X-Timestamp
          in: header
          required: true
          schema:
            type: integer
        - name: X-Nonce
          in: header
          required: true
          schema:
            type: string
        - name: X-Signature
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
            example:
              ping: signature-check
      responses:
        "200":
          description: Signature verified
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          ok:
                            type: boolean
                            example: true
                          company_id:
                            type: string
                            format: uuid
                          credential_id:
                            oneOf:
                              - type: integer
                              - type: string
                                format: uuid
                          raw_body_bytes:
                            type: integer
                            example: 28
        "401":
          description: Invalid/missing headers, timestamp, or signature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: API key not authorized for this company
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/webhooks/invoices:
    post:
      summary: Receive NRS transmit event webhook
      description: |
        Webhook endpoint for NRS Exchange transmission lifecycle events.

        Expected payload shape:
        - `irn`: invoice IRN
        - `message`: one of `TRANSMITTING`, `TRANSMITTED`, `ACKNOWLEDGED`, `FAILED`

        This endpoint is event-driven and idempotent for duplicate notifications. It returns `200 OK` for successfully processed events.
      tags: [ERP Integration]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [irn, message]
              properties:
                irn:
                  type: string
                  example: INV0990-088ED42R-20270920
                message:
                  type: string
                  enum: [TRANSMITTING, TRANSMITTED, ACKNOWLEDGED, FAILED]
                  example: TRANSMITTING
            example:
              irn: INV0990-088ED42R-20270920
              message: TRANSMITTING
      responses:
        "200":
          description: Webhook event processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"
        "400":
          description: Invalid payload (missing/invalid irn or message)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Invoice not found for supplied IRN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "429":
          description: Webhook rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/erp/{companyId}/invoices:
    get:
      summary: List invoices for a company (ERP programmatic)
      description: |
        Retrieve invoices for a company without user login / OTP.

        **Authentication:** `X-Api-Key` only (no HMAC signature required for GET).

        Use this for programmatic integrations that need to fetch invoice lists even when OTP is enabled for interactive login.
      tags: [ERP Integration]
      security: []
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: string
          description: Your company ID - find it in Settings -> Developer Options -> ERP Ingest Endpoint
        - name: X-Api-Key
          in: header
          required: true
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            example: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            example: 20
      responses:
        "200":
          description: Invoices fetched
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Invoice"
                      meta:
                        type: object
                        properties:
                          page:
                            type: integer
                          limit:
                            type: integer
                          total:
                            type: integer
                          totalPages:
                            type: integer
        "401":
          description: Missing/invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: API key not authorized for this company
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Company not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      summary: Ingest invoice from ERP
      description: |
        Submit an invoice from an external ERP system. This is the primary integration endpoint.

        **Authentication:** HMAC-SHA256 signed request - no user login required.

        Note: this endpoint does not auto-sign on behalf of ERP. Your ERP must compute and send `X-Signature`.

        **Get your endpoint URL and API key from Settings -> Developer Options.**

        **Required headers:**

        | Header | Description |
        |---|---|
        | `X-Api-Key` | Your API key |
        | `X-Timestamp` | Unix timestamp in seconds (within 300s of server time) |
        | `X-Nonce` | Unique per-request string (UUID recommended, never reuse) |
        | `X-Signature` | `HMAC-SHA256(secret, "{timestamp}.{body}")` as hex |

        **Node.js signing:**

        ```javascript
        const hmac = crypto.createHmac('sha256', secret);
        hmac.update(`${timestamp}.`);
        hmac.update(bodyString);
        const signature = hmac.digest('hex');
        ```

        **Python signing:**

        ```python
        msg = f"{timestamp}.".encode() + body.encode()
        signature = hmac.new(secret.encode(), msg, hashlib.sha256).hexdigest()
        ```

        **IRN:** Do not send an `irn` field. The system generates it from `invoice_number` + `service_id` + `issue_date`.

        **Credit Note requirement (explicit):**
        - When `invoice_type_code` resolves to `380` (Credit Note), you must send `originator_document_reference` as an array and include at least one element with a non-empty `irn`.
        - If missing, the API rejects the request at validation level.

        **Field mapping:** In Settings -> Mappings, key mappings rename a top-level ERP JSON key to a canonical NRS field path; value mappings translate an ERP-sent code into an allowed NRS value for enum-like fields (e.g. `invoice_type_code`, `invoice_kind`, `invoice_line.hsn_code` and `invoice_line.isic_code` on each `invoice_line[]` element). Both run before normalization and storage.
      tags: [ERP Integration]
      security: []
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: string
          description: Your company ID - find it in Settings -> Developer Options -> ERP Ingest Endpoint
        - name: X-Api-Key
          in: header
          required: true
          schema:
            type: string
        - name: X-Timestamp
          in: header
          required: true
          schema:
            type: integer
          description: Unix epoch seconds
        - name: X-Nonce
          in: header
          required: true
          schema:
            type: string
          description: Unique per request - never reuse
        - name: X-Signature
          in: header
          required: true
          schema:
            type: string
          description: HMAC-SHA256 hex of timestamp.body
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoicePayload"
            example:
              invoice_number: INV2026001
              issue_date: 2026-03-19
              due_date: 2026-04-18
              document_currency_code: NGN
              tax_currency_code: NGN
              accounting_supplier_party:
                party_name: Acme Corp Ltd
                tin: 12345678-0001
                email: billing@acme.com
                postal_address:
                  street_name: 12 Marina Street
                  city_name: Lagos
                  postal_zone: "100001"
                  country: NG
              accounting_customer_party:
                party_name: Buyer Company Ltd
                tin: 98765432-0001
                email: buyer@example.com
                postal_address:
                  street_name: 5 Broad Street
                  city_name: Abuja
                  postal_zone: "900001"
                  lga: NG-FC-ABC
                  state: NG-FC
                  country: NG
              tax_total:
                - tax_amount: 7500
                  tax_subtotal:
                    - taxable_amount: 50000
                      tax_amount: 7500
                      tax_category:
                        id: VAT
                        percent: 7.5
              legal_monetary_total:
                line_extension_amount: 50000
                tax_exclusive_amount: 50000
                tax_inclusive_amount: 57500
                payable_amount: 57500
              invoice_line:
                - line_number: 1
                  invoiced_quantity: 10
                  line_extension_amount: 50000
                  item:
                    name: Laptop Computer
                    sellers_item_identification: SKU-LAP-001
                  price:
                    price_amount: 5000
                    price_unit: EA
      responses:
        "201":
          description: Invoice ingested successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          invoice_id:
                            type: integer
                            example: 42
        "400":
          description: Validation error, invalid invoice_number, or service_id not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Missing/invalid headers, bad signature, timestamp skew, or replay detected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: API key not authorized for this company
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Duplicate IRN - invoice_number already submitted for this issue_date
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/erp/{companyId}/invoices/status:
    post:
      summary: Update invoice payment status by IRN (ERP)
      description: |
        Update an invoice's payment `payment_status` using its IRN, without interactive login. Workflow `status` (draft vs submitted to NRS) is not changed by this endpoint.

        **Authentication:** Same HMAC-SHA256 signing as `POST /api/erp/{companyId}/invoices` (`X-Api-Key`, `X-Timestamp`, `X-Nonce`, `X-Signature` over the raw JSON body).

        **Behavior:**
        - For `payment_status: "paid"`, the server runs the same NRS sandbox update as the UI "mark paid", then sets local `payment_status` to `paid` (workflow `status` stays e.g. `sent`). The invoice must already be in `sent`, `submitted_to_nrs`, or legacy `paid` workflow.
        - For `unpaid`, `pending`, or `rejected`, only the local `payment_status` column is updated (no NRS call).

        **Allowed `payment_status` values:** `unpaid`, `pending`, `paid`, `rejected` (case-insensitive; `PAID` / `PENDING` accepted as aliases for `paid` / `pending`; invalid values fall back to `pending`).
      tags: [ERP Integration]
      security: []
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: string
          description: Your company ID - same as ERP ingest endpoint
        - name: X-Api-Key
          in: header
          required: true
          schema:
            type: string
        - name: X-Timestamp
          in: header
          required: true
          schema:
            type: integer
          description: Unix epoch seconds
        - name: X-Nonce
          in: header
          required: true
          schema:
            type: string
        - name: X-Signature
          in: header
          required: true
          schema:
            type: string
          description: HMAC-SHA256 hex of timestamp.body
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [irn, payment_status]
              properties:
                irn:
                  type: string
                  description: Invoice Reference Number (FIRS IRN)
                payment_status:
                  type: string
                  description: Target payment status (case-insensitive)
                  example: paid
                  enum: [unpaid, pending, paid, rejected, PAID, PENDING]
                reference:
                  type: string
                  nullable: true
                  description: Optional reference forwarded to NRS when marking paid
            example:
              irn: INV2026001-D0164F59-20260319
              payment_status: paid
              reference: ERP-PAY-991
      responses:
        "200":
          description: Payment status updated (or already paid)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          invoice_id:
                            type: integer
                          irn:
                            type: string
                          status:
                            type: string
                          payment_status:
                            type: string
                            nullable: true
                          updated_at:
                            type: string
                            format: date-time
                            nullable: true
        "400":
          description: Missing/invalid irn or payment_status, invalid payment_status value, or invoice not eligible for paid update
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Missing/invalid HMAC headers or signature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: API key not authorized for this company
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Company or invoice (IRN) not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "502":
          description: NRS paid update failed (when payment_status is paid)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
