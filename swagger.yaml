                $ref: "#/components/schemas/ApiSuccess"
  /api/company/credentials/rotate:
    post:
      summary: Get API credential
      description: Generate a new `api_key` / `secret` pair. The secret is returned once and cannot be retrieved again. Previous credentials remain active until revoked.
      tags: [Company]
      responses:
        "201":
          description: New credential created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          credential_id:
                            type: string
                            format: uuid
                          api_key:
                            type: string
                            example: a3f1c2d4e5b6a7f8c9d0e1f2
                          secret:
                            type: string
                            description: Shown once only - store securely
                          created_at:
                            type: string
                            format: date-time
  /api/company/credentials/revoke:
    post:
      summary: Revoke API credential
      description: Revoke an active API credential. Any ERP system using this key will immediately lose access.
      tags: [Company]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [credential_id]
              properties:
                credential_id:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Credential revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"
        "404":
          description: Credential not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/mappings/field-catalog:
    get:
      summary: List NRS invoice field catalog
      description: Canonical NRS JSON field ids (mandatory/optional, descriptions) for building key mappings in Settings. Requires admin permission.
      tags: [Mappings]
      responses:
        "200":
          description: Catalog retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"
  /api/mappings/value-options:
    get:
      summary: List NRS value options for a field
      description: Returns allowed canonical values for value mapping. Query `field=invoice_type_code`, `field=invoice_kind`, `field=invoice_line.hsn_code` (HS / product codes on each line; legacy `field=hsn_code` is still accepted for options), `field=invoice_line.isic_code` (ISIC Rev.4 class codes on each line), `field=tax_total.tax_subtotal.tax_category.id` (tax category ids), `field=payment_means.payment_means_code` (UN/CEFACT payment means codes), `field={party}.postal_address.lga` where `{party}` is `accounting_customer_party`, `accounting_supplier_party`, `payee_party`, `bill_party`, `ship_party`, or `tax_representative_party` (Nigeria LGA codes); same party roots for `.postal_address.state` (state codes) and `.postal_address.country` (ISO 3166-1 alpha-2), `field=document_currency_code`, or `field=tax_currency_code`. Requires admin permission.
      tags: [Mappings]
      parameters:
        - name: field
          in: query
          required: true
          schema:
            type: string
            example: invoice_type_code
      responses:
        "200":
          description: Options retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"
  /api/mappings:
    get:
      summary: List field mappings
      description: "List key and value mapping entries for the active set. Each row includes `mapping_kind`: `key` or `value`."
      tags: [Mappings]
      responses:
        "200":
          description: Mappings retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"
  /api/mappings/entries:
    post:
      summary: Add field mapping
      description: |
        - **key** (default): `field` is the canonical NRS path; `from_value` is the ERP JSON key to move from. `to_value` optional, defaults to `field`.
        - **value**: `mapping_kind` must be `value`; `field` must be a value-mappable field (e.g. `invoice_type_code`, `invoice_kind`, `invoice_line.hsn_code` for line HS codes, `invoice_line.isic_code` for line ISIC class codes, `tax_total.tax_subtotal.tax_category.id` for tax subtotals, `payment_means.payment_means_code` for each `payment_means[]` entry, `{party}.postal_address.lga` / `.state` / `.country` for `accounting_customer_party`, `accounting_supplier_party`, `payee_party`, `bill_party`, `ship_party`, or `tax_representative_party` (LGA, state, ISO alpha-2 country), `document_currency_code`, `tax_currency_code`); `from_value` is what the ERP sends; `to_value` is the required NRS value (see GET /api/mappings/value-options).

        Requires admin permission.
      tags: [Mappings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [field, from_value]
              properties:
                mapping_kind:
                  type: string
                  enum: [key, value]
                  description: Omit or `key` for JSON key rename; `value` for enum/code translation.
                field:
                  type: string
                  description: Canonical NRS field path (key) or target field for value maps
                  example: invoice_type_code
                from_value:
                  type: string
                  description: ERP JSON key (key maps) or ERP-sent value to match (value maps)
                  example: COMM_INV
                to_value:
                  type: string
                  description: Required for value maps (NRS code). For key maps defaults to `field` when omitted.
      responses:
        "200":
          description: Mapping saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"
        "400":
          description: Missing fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/mappings/entries/{id}:
    delete:
      summary: Delete field mapping
      description: Remove a mapping entry. Requires admin permission.
      tags: [Mappings]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Mapping deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"
        "404":
          description: Mapping not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
